name: ML CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  train:
    runs-on: ubuntu-latest

    outputs:
      rmse: ${{ steps.metrics.outputs.rmse }}
      r2: ${{ steps.metrics.outputs.r2 }}
      dataset_size: ${{ steps.metrics.outputs.dataset_size }}
      deploy: ${{ steps.gate.outputs.deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Pull data from S3 via DVC
        run: dvc pull -r s3remote_2022bcs0168

      - name: Train model
        run: |
          python src/train.py

      - name: Extract metrics
        id: metrics
        run: |
          RMSE=$(jq '.rmse' artifacts/metrics.json)
          R2=$(jq '.r2' artifacts/metrics.json)
          SIZE=$(jq '.dataset_size' artifacts/metrics.json)

          echo "rmse=$RMSE" >> $GITHUB_OUTPUT
          echo "r2=$R2" >> $GITHUB_OUTPUT
          echo "dataset_size=$SIZE" >> $GITHUB_OUTPUT

          echo "### Training Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- Dataset Size: $SIZE training samples" >> $GITHUB_STEP_SUMMARY
          echo "- RMSE: $RMSE" >> $GITHUB_STEP_SUMMARY
          echo "- R² Score: $R2" >> $GITHUB_STEP_SUMMARY
          echo "- Student: Pratyush Nanda (2022BCS0168)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment gate
        id: gate
        run: |
          echo "Previous BEST_R2 = ${{ vars.BEST_R2 }}"
          echo "Previous BEST_RMSE = ${{ vars.BEST_RMSE }}"

          CUR_R2=${{ steps.metrics.outputs.r2 }}
          CUR_RMSE=${{ steps.metrics.outputs.rmse }}

          BETTER_R2=$(echo "$CUR_R2 > ${{ vars.BEST_R2 }}" | bc -l)
          BETTER_RMSE=$(echo "$CUR_RMSE < ${{ vars.BEST_RMSE }}" | bc -l)

          if [[ "$BETTER_R2" -eq 1 && "$BETTER_RMSE" -eq 1 ]]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Deployment approved (metrics improved)" >> $GITHUB_STEP_SUMMARY
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Deployment skipped (no metric improvement)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model/
            artifacts/

  deploy:
    needs: train
    if: needs.train.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-model

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_ACCESS_TOKEN }}" | docker login \
            -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/housing_predict_2022bcs0168:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/housing_predict_2022bcs0168:latest

      - name: Update BEST_R2 and BEST_RMSE
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          gh api -X PATCH repos/${{ github.repository }}/actions/variables/BEST_R2 \
            -f name=BEST_R2 \
            -f value=${{ needs.train.outputs.r2 }}

          gh api -X PATCH repos/${{ github.repository }}/actions/variables/BEST_RMSE \
            -f name=BEST_RMSE \
            -f value=${{ needs.train.outputs.rmse }}
